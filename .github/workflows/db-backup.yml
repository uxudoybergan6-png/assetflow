name: DB Backup (Neon → GCS)

# Kunlik Postgres (Neon) logical backup → GCS bucket (Bosqich 1 #8).
# Neon'ning o'z branch/PITR snapshot'iga QO'SHIMCHA mustaqil nusxa (provider-lock'siz DR).
#
# ⚠️ MANUAL SOZLASH (kod bilan qilib bo'lmaydi):
#   1) Backup bucket yarating + versioning yoqing:
#        gcloud storage buckets create gs://frameflow-db-backups --location=europe-west1
#        gcloud storage buckets update gs://frameflow-db-backups --versioning
#        # (ixtiyoriy) lifecycle bilan 30 kundan eskisini o'chirish.
#   2) github-deployer service account'ga shu bucket'ga yozish huquqi (roles/storage.objectAdmin).
#   3) Repo secret/var: BACKUP_GCS_BUCKET = frameflow-db-backups
#      (DATABASE_URL mavjud CLOUDRUN_ENV_YAML secret'idan olinadi — alohida secret shart emas).

on:
  schedule:
    - cron: "0 3 * * *" # har kuni 03:00 UTC
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  REGION: europe-west1
  WIF_PROVIDER: projects/331762958776/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@project-289028d3-984c-4d84-bd4.iam.gserviceaccount.com
  PG_MAJOR: "18" # Neon PG versiyasiga moslang (2026-07: Neon server = PG 18.4; pg_dump >= server MAJOR bo'lishi shart)

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y "postgresql-client-${PG_MAJOR}"
          # Runner'da eski pg_dump (16) /usr/bin'da bor; yangi versiya /usr/lib/postgresql/<ver>/bin'da.
          # PATH'ni majburan yangi versiyaga yo'naltiramiz (server version mismatch oldini oladi).
          echo "/usr/lib/postgresql/${PG_MAJOR}/bin" >> "$GITHUB_PATH"
          "/usr/lib/postgresql/${PG_MAJOR}/bin/pg_dump" --version

      - name: Extract DATABASE_URL from deploy secret
        env:
          CLOUDRUN_ENV_YAML: ${{ secrets.CLOUDRUN_ENV_YAML }}
        run: |
          set -euo pipefail
          printf '%s\n' "$CLOUDRUN_ENV_YAML" > cloudrun-env.yaml
          DB_URL="$(grep -E '^DATABASE_URL:' cloudrun-env.yaml | head -1 | sed -E 's/^DATABASE_URL:[[:space:]]*//; s/^"//; s/"[[:space:]]*$//')"
          if [ -z "$DB_URL" ]; then
            echo "::error::DATABASE_URL cloudrun-env.yaml'da topilmadi" >&2
            exit 1
          fi
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          rm -f cloudrun-env.yaml

      - name: Run backup
        env:
          BACKUP_GCS_BUCKET: ${{ secrets.BACKUP_GCS_BUCKET || vars.BACKUP_GCS_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_GCS_BUCKET:-}" ]; then
            echo "::error::BACKUP_GCS_BUCKET secret/var yo'q — bucket yarating va qo'shing (workflow izohiga qarang)" >&2
            exit 1
          fi
          node scripts/db-backup.mjs
