name: keepalive

# Render bepul tarif 15 daqiqa harakatsizlikdan keyin instance'ni uxlatadi (cold-start
# keyingi so'rovni ~30-60s sekinlashtiradi). Bu cron har ~10 daqiqada /health'ga ping
# yuborib instance'ni uyg'oq tutadi. BEPUL yechim.
#
# Eslatma: GitHub Actions cron KAFOLATLANGAN emas — yuklama vaqtida bir necha daqiqa
# kechikishi yoki repo 60 kun harakatsiz bo'lsa to'xtashi mumkin. Ishonchli uptime kerak
# bo'lsa: Render Starter ($7/oy, uxlamaydi) yoki tashqi pinger (UptimeRobot / cron-job.org).

on:
  schedule:
    - cron: "*/10 * * * *" # har ~10 daqiqada (GitHub kechiktirishi mumkin)
  workflow_dispatch: {} # qo'lda ishga tushirish (Actions tab)

# Bir vaqtda bitta — kechikkan ishlar yig'ilib qolmasin
concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL || 'https://assetflow-rqbq.onrender.com/health' }}
        run: |
          echo "Ping: $HEALTH_URL"
          # cold-start'da Render uyg'onishi ~60s olishi mumkin — retry + uzoq timeout
          code=$(curl -sS --max-time 90 --retry 3 --retry-delay 15 --retry-all-errors \
                   -o /tmp/health.txt -w "%{http_code}" "$HEALTH_URL" || echo 000)
          echo "HTTP $code"
          cat /tmp/health.txt 2>/dev/null || true
          echo
          if [ "$code" != "200" ]; then
            echo "::warning::keepalive ping 200 emas (HTTP $code) — Render uxlagan yoki nosoz bo'lishi mumkin"
          fi
