name: Deploy API to Cloud Run

# main'ga apps/api yoki packages/database o'zgarsa, avtomatik Cloud Run'ga deploy
# qiladi (Cloud Shell'da qo'lda bash deploy-cloudrun.sh ishlatishga o'rin qoldirmaydi).
# Auth — Workload Identity Federation (kalitsiz; org policy JSON kalit yaratishni
# bloklagani uchun). Kerakli repo secret: CLOUDRUN_ENV_YAML (cloudrun-env.yaml
# fayl tarkibi, butunligicha).

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/database/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-cloudrun.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT: project-289028d3-984c-4d84-bd4
  REGION: europe-west1
  SERVICE: assetflow-api
  REPO: assetflow
  WIF_PROVIDER: projects/331762958776/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@project-289028d3-984c-4d84-bd4.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" -q

      - name: Write cloudrun-env.yaml
        env:
          CLOUDRUN_ENV_YAML: ${{ secrets.CLOUDRUN_ENV_YAML }}
        run: printf '%s\n' "$CLOUDRUN_ENV_YAML" > cloudrun-env.yaml

      # Gate: yangi kod DEPLOY bo'lishidan OLDIN migratsiyalar qo'llanadi. Xato
      # bo'lsa bu qadam yiqiladi → build/push/deploy ISHLAMAYDI → eski (ishlaydigan)
      # revision jonli qoladi. render.yaml'ning preDeployCommand gate'i o'rnini
      # bosadi (Cloud Run'da preDeploy yo'q). Migratsiyalar FAQAT additive bo'lgani
      # uchun eski kod yangi sxemani ham tolerat qiladi.
      - name: Setup Node (migration)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps (migration)
        run: npm ci

      - name: Run DB migrations (gated — fail stops deploy)
        run: |
          set -euo pipefail
          # DATABASE_URL'ni deploy env yaml'idan ajratamiz (yagona haqiqat manbai —
          # CLOUDRUN_ENV_YAML secret). Qo'shtirnoqlarni tozalaymiz.
          DB_URL="$(grep -E '^DATABASE_URL:' cloudrun-env.yaml | head -1 | sed -E 's/^DATABASE_URL:[[:space:]]*//; s/^"//; s/"[[:space:]]*$//')"
          if [ -z "$DB_URL" ]; then
            echo "::error::DATABASE_URL cloudrun-env.yaml'da topilmadi — migratsiya bekor qilindi" >&2
            exit 1
          fi
          export DATABASE_URL="$DB_URL"
          npm run migrate:deploy -w @creative-tools/database

      - name: Build image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/api"
          docker build --provenance=false -t "$IMG:latest" -t "$IMG:${GITHUB_SHA}" .

      - name: Push image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/api"
          docker push "$IMG:latest"
          docker push "$IMG:${GITHUB_SHA}"

      - name: Deploy to Cloud Run
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/api:${GITHUB_SHA}"
          gcloud run deploy "$SERVICE" --image "$IMG" \
            --region "$REGION" --allow-unauthenticated \
            --no-cpu-throttling --min-instances 1 --max-instances 2 \
            --memory 1Gi --cpu 1 --timeout 600 \
            --env-vars-file cloudrun-env.yaml

      - name: Show URL
        run: gcloud run services describe "$SERVICE" --region "$REGION" --format='value(status.url)'
