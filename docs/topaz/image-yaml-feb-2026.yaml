components:
  schemas:
    EnhanceGANRequest:
      type: object
      properties:
        image:
          type: string
          contentMediaType: application/octet-stream
          description: |
            The image file to be processed. Supported formats:
              - jpeg (or jpg)
              - png
              - tiff (or tif)
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_url:
          type: string
          description: The URL of the source image.
          examples:
            - https://example.com/image.jpg
        model:
          type: string
          description: The model to use for processing the image.
          enum:
            - Standard V2
            - Low Resolution V2
            - CGI
            - High Fidelity V2
            - Text Refine
          default: Standard V2
        output_height:
          type: integer
          description: The desired height of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally.
          minimum: 1
          maximum: 32000
          examples:
            - 1080
        output_width:
          type: integer
          description: The desired width of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally.
          minimum: 1
          maximum: 32000
          examples:
            - 1920
        crop_to_fill:
          type: boolean
          description: Default behavior is to letterbox the image if a differing aspect ratio is chosen. Enable `crop_to_fill` by setting this to `true` if you instead want to crop the image to fill the dimensions.
          default: false
        output_format:
          type: string
          description: The desired format of the output image.
          enum:
            - jpeg
            - jpg
            - png
            - tiff
            - tif
          default: jpeg
        webhook_url:
          type: string
          description: |
            The URL to send the webhook to. When provided, a POST request with a JSON payload will be sent to this URL when the job status changes or completes.

            **Request Body:**
            The webhook will be sent as a POST request with `Content-Type: application/json` containing the following fields:
              - `notification_id` (string, ULID): Unique identifier for this notification. Can be used to order messages in case they are received out of order; see the [ULID specification](https://github.com/ulid/spec)
              - `process_id` (string, UUID): Unique identifier of the image processing job.
              - `status` (string): Current status of the job (i.e., "Pending", "Processing", "Completed", "Cancelled", "Failed").
              - `creation_time` (integer): Unix timestamp in seconds when the job was created.
              - `modification_time` (integer): Unix timestamp in seconds when the job was last modified.
              - `progress` (integer): Progress of the job as a percentage (0-100).
              - `download_url` (string, optional): Presigned GET URL for the processed image. Only present once the job is completed.
              - `head_url` (string, optional): Presigned HEAD URL for the processed image. Only present once the job is completed.
              - `input_download_url` (string): Presigned GET URL for the input image.
              - `input_head_url` (string): Presigned HEAD URL for the input image.

            **Retry Behavior:**
            If the webhook endpoint returns a 5xx server error, the system will retry the webhook with exponential backoff. The backoff starts at 5 seconds and doubles with each retry attempt (5s, 10s, 20s, 40s, etc.), up to a maximum of 15 minutes. Client errors (4xx status codes) are not retried and the notification is discarded.
          examples:
            - https://example.com/webhook
      additionalProperties:
        type: string
        description: Additional key-value pairs to be used as model settings. Only pairs relevant for your chosen model are used. Please see the [available models](https://developer.topazlabs.com/image-api/available-models) for more details.

    EnhanceGenRequest:
      type: object
      properties:
        image:
          type: string
          contentMediaType: application/octet-stream
          description: |
            The image file to be processed. Supported formats:
              - jpeg (or jpg)
              - png
              - tiff (or tif)
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_url:
          type: string
