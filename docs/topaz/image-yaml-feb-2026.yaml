      type: object
      required:
        - input_height
        - input_width
      properties:
        category:
          type: string
          description: Indicates which category of model is being used.
          enum:
            - Enhance
            - Sharpen
            - Denoise
            - Restore
            - Lighting
            - Matting
            - Tool
          default: Enhance
        model:
          type: string
          description: The model to use for processing the image.
          enum:
            - Standard MAX
            - Recovery V2
            - Wonder
            - Redefine
            - Super Focus V2
            - Dust-Scratch
            - Dust-Scratch V2
          default: Redefine
        input_height:
          type: integer
          description: The height of the input image in pixels.
          minimum: 1
          maximum: 32000
          examples:
            - 1080
        input_width:
          type: integer
          description: The width of the input image in pixels.
          minimum: 1
          maximum: 32000
          examples:
            - 1920
        output_height:
          type: integer
          description: The desired height of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally. Only applicable for Enhance models.
          minimum: 1
          maximum: 32000
          examples:
            - 1080
        output_width:
          type: integer
          description: The desired width of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally. Only applicable for Enhance models.
          minimum: 1
          maximum: 32000
          examples:
            - 1920
        crop_to_fill:
          type: boolean
          description: Default behavior is to letterbox the image if a differing aspect ratio is chosen. Enable `crop_to_fill` by setting this to `true` if you instead want to crop the image to fill the dimensions.
          default: false
        output_format:
          type: string
          description: The desired format of the output image.
          enum:
            - jpeg
            - jpg
            - png
            - tiff
            - tif
          default: jpeg
      additionalProperties:
        type: string
        description: Additional key-value pairs to be used as model settings. Only pairs relevant for your chosen model are used. Please see the [available models](https://developer.topazlabs.com/image-api/available-models) for more details.

    EstimateBulkRequest:
      type: array
      items:
        type: object
        required:
          - input_height
          - input_width
        properties:
          category:
            type: string
            description: Indicates which category of model is being used.
            enum:
              - Enhance
              - Sharpen
              - Denoise
              - Restore
              - Lighting
            default: Enhance
          model:
            type: string
            description: The model to use for processing the image.
            enum:
              - Standard V2
              - Low Resolution V2
              - CGI
              - High Fidelity V2
              - Text Refine
              - Standard MAX
              - Recovery V2
              - Wonder
              - Redefine
              - Standard
              # Note: Strong is a model name for both Denoise and Sharpen models
              - Strong
              - Lens Blur
              - Lens Blur V2
              - Motion Blur
              - Natural
              - Refocus
              - Wildlife
              - Portrait
              - Super Focus V2
              - Normal
              - Extreme
              - Dust-Scratch
              - Dust-Scratch V2
              - Adjust
              - Adjust V2
              - White Balance
              - Colorize
              - Object
              - Transparency Upscale
            default: Standard V2
          input_height:
            type: integer
            description: The height of the input image in pixels.
            minimum: 1
            maximum: 32000
            examples:
              - 1080
          input_width:
            type: integer
            description: The width of the input image in pixels.
            minimum: 1
            maximum: 32000
            examples:
              - 1920
          output_height:
            type: integer
            description: The desired height of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally. Only applicable for Enhance models.
            minimum: 1
            maximum: 32000
            examples:
              - 1080
          output_width:
            type: integer
            description: The desired width of the output image in pixels. Your image will automatically be upscaled to this specified value. If only one of `output_height` and `output_width` is set, then the other dimension is scaled proportionally. Only applicable for Enhance models.
            minimum: 1
            maximum: 32000
            examples:
              - 1920
          crop_to_fill:
            type: boolean
            description: Default behavior is to letterbox the image if a differing aspect ratio is chosen. Enable `crop_to_fill` by setting this to `true` if you instead want to crop the image to fill the dimensions.
            default: false
          output_format:
            type: string
            description: The desired format of the output image.
            enum:
              - jpeg
              - jpg
              - png
              - tiff
              - tif
            default: jpeg
        additionalProperties:
          type: string
          description: Additional key-value pairs to be used as model settings. Only pairs relevant for your chosen model are used. Please see the [available models](https://developer.topazlabs.com/image-api/available-models) for more details.

    AsyncResponse:
      type: object
      required:
        - process_id
        - source_id
        - eta
      properties:
        process_id:
          type: string
          description: Unique identifier of the image processing job.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        eta:
          type: integer
          description: Estimated time of arrival (ETA) for the process to complete in Unix time.
          examples:
            - 1617220000

    StatusResponse:
      type: object
      required:
        - process_id
        - filename
        - input_format
        - input_height
        - input_width
        - output_format
        - output_height
        - output_width
        - category
        - model_type
        - model
        - crop_to_fill
        - status
        - progress
        - eta
        - creation_time
        - modification_time
        - credits
      properties:
        process_id:
          type: string
          description: Unique identifier of the image processing job.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        source_id:
          type: string
          description: Unique identifier of the source image.
          examples:
            - d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
        filename:
          type: string
          description: Name of the file being processed.
          examples:
            - image.png
        input_format:
          type: string
          description: Format of the input file.
          examples:
            - png
        input_height:
          type: integer
          description: Height of the input image in pixels.
          examples:
            - 720
        input_width:
          type: integer
          description: Width of the input image in pixels.
          examples:
            - 1280
        output_format:
          type: string
          description: Format of the output file.
          examples:
            - jpeg
        output_height:
          type: integer
          description: Height of the output image in pixels.
          examples:
            - 1080
        output_width:
          type: integer
          description: Width of the output image in pixels.
          examples:
            - 1920
        category:
          type: string
          description: Category of model used for processing.
          examples:
            - Enhance
        model_type:
          type: string
          description: Type of model used for processing.
          examples:
            - GAN
        model:
          type: string
          description: Model used for processing.
          examples:
            - Standard V2
        crop_to_fill:
          type: boolean
          description: Whether cropping to fill is enabled.
          examples:
            - false
        options_json:
          type: string
          description: Additional options in JSON format.
          examples:
            - '{"creativity": 90}'
        status:
          type: string
          description: Status of the job.
          enum:
            - Pending
            - Processing
            - Completed
            - Cancelled
            - Failed
          examples:
            - Completed
        progress:
          type: integer
          description: Progress of the job as a percentage. Useful for displaying a progress bar or loading spinners etc.
          minimum: 0
          maximum: 100
          examples:
            - 100
        eta:
          type: integer
          description: Estimated time of arrival (ETA) for the process to complete in Unix time.
          examples:
            - 1617220000
        creation_time:
          type: integer
          description: Creation time of the job in Unix epoch format.
          examples:
            - 1633024800
        modification_time:
          type: integer
          description: Last modification time of the job in Unix epoch format.
          examples:
            - 1633038400
        credits:
          type: integer
          description: Credits (to be) consumed on image processing completion.
          examples:
            - 2

    DownloadResponse:
      type: object
      required:
        - head_url
        - download_url
        - expiry
      properties:
        download_url:
          type: string
          description: The presigned URL for downloading the image. This URL is temporary and will **expire after 1 hour**.
          examples:
            - https://<...>/d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b?<presigned_headers>
        head_url:
          type: string
          description: The presigned URL for fetching the metadata of the image's file. Useful for retrieving the image's size before download. This URL is temporary and will **expire after 1 hour**.
          examples:
            - https://<...>/d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b?<presigned_headers>
        expiry:
          type: integer
          description: The expiration time (in Unix epoch) of the presigned download link, set as 1 hour after download link generation. After this time, the link will no longer be valid.
          examples:
            - 1617220000

    EstimationResponse:
      type: object
      required:
        - duration
        - credits
      properties:
        duration:
          type: integer
          description: The estimated time taken in seconds for the image to be enhanced with the given parameters.
          minimum: 0
          examples:
            - 30
        credits:
          type: integer
          description: The number of credits that would be consumed if the given requests was executed.
          minimum: 1
          examples:
            - 2

    EstimationBulkResponse:
      type: array
      items:
        oneOf:
          - type: object
            required:
              - duration
              - credits
              - status
            properties:
              duration:
                type: integer
                description: The estimated time taken in seconds for the image to be enhanced with the given parameters.
                minimum: 0
                examples:
                  - 30
              credits:
                type: integer
                description: The number of credits that would be consumed if the given requests was executed.
                minimum: 1
                examples:
                  - 2
              status:
                type: string
                enum:
                  - success
                description: Indicates that the estimation for this item in the bulk request was successful.
                examples:
                  - success
          - type: object
            required:
              - status
              - code
              - message
            properties:
              status:
                type: string
                enum: [error]
                description: Indicates that an error occurred while processing this item in the bulk request.
                examples:
                  - error
              code:
                type: integer
                description: HTTP-like error code
                examples:
                  - 413
              message:
                type: string
                description: Error message
                examples:
                  - Output image dimensions exceed maximum allowed of 256 MP.

    PaginationMetadata:
      type: object
      required:
        - has_next_page
      properties:
        next_cursor:
          type: string
          description: The cursor to use for retrieving the next page of results. Omitted if there are no more pages.
          examples:
            - eyJwcm9jZXNzX2lkIjoiZDdiM2IzYjMzLTdiM2ItNGIzYi04YjNiLTNiM2IzYjNiM2IzYiJ9
        has_next_page:
          type: boolean
          description: Indicates whether there are more pages of results available.
          examples:
            - true

    PaginatedStatusesResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          description: Array of status responses for the current page.
          items:
            $ref: "#/components/schemas/StatusResponse"
        pagination:
          $ref: "#/components/schemas/PaginationMetadata"

  responses:
    BadRequestImage:
