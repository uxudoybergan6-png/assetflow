  /status:
    get:
      tags:
        - Status
      summary: Get All Statuses
      operationId: getAllStatuses
      description: |
        Retrieve the status of all image processing jobs.

        **Pagination (Highly Recommended):**
        For better performance and to handle large numbers of statuses, pagination is highly recommended. Enable pagination by setting `paginated=true`. When pagination is enabled:
          - Use the `limit` parameter to control the number of results per page (default: 50, maximum: 100)
          - Use the `cursor` parameter to retrieve subsequent pages
          - The response will include pagination metadata with `next_cursor` and `has_next_page` fields

        **Non-Paginated Response:**
        When `paginated=false` (default) or omitted, the endpoint returns all statuses **up to 7 days old** as a simple array. This may be slow or fail for accounts with many statuses.
      parameters:
        - name: paginated
          in: query
          required: false
          description: Enable pagination for the response. Highly recommended for better performance.
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          description: Number of results per page when pagination is enabled. Ignored if `paginated=false`. Defaults to 50, maximum is 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          description: Cursor for pagination. Use the `next_cursor` value from the previous response to retrieve the next page. Ignored if `paginated=false`.
          schema:
            type: string
      responses:
        "200":
          description: Statuses of all processes. The response format depends on whether pagination is enabled.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    description: Non-paginated response (when `paginated=false` or omitted)
                    items:
                      $ref: "#/components/schemas/StatusResponse"
                  - $ref: "#/components/schemas/PaginatedStatusesResponse"
              examples:
                nonPaginated:
                  summary: Non-paginated response
                  value:
                    - process_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                      source_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                      filename: image.png
                      input_format: png
                      input_height: 720
                      input_width: 1280
                      output_format: jpeg
                      output_height: 1080
                      output_width: 1920
                      category: Enhance
                      model_type: GAN
                      model: Standard V2
                      crop_to_fill: false
                      status: Completed
                      progress: 100
                      eta: 1617220000
                      creation_time: 1633024800
                      modification_time: 1633038400
                      credits: 2
                paginated:
                  summary: Paginated response
                  value:
                    data:
                      - process_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                        source_id: d7b3b3b3-7b3b-4b3b-8b3b-3b3b3b3b3b3b
                        filename: image.png
                        input_format: png
                        input_height: 720
                        input_width: 1280
                        output_format: jpeg
                        output_height: 1080
                        output_width: 1920
                        category: Enhance
                        model_type: GAN
                        model: Standard V2
                        crop_to_fill: false
                        status: Completed
                        progress: 100
                        eta: 1617220000
                        creation_time: 1633024800
                        modification_time: 1633038400
                        credits: 2
                    pagination:
                      next_cursor: eyJwcm9jZXNzX2lkIjoiZDdiM2IzYjMzLTdiM2ItNGIzYi04YjNiLTNiM2IzYjNiM2IzYiJ9
                      has_next_page: true
        "400":
          $ref: "#/components/responses/BadRequestProcess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
