<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="160" fill="#090a0c"/>

  <!-- Icon mark (140x140 area, padded to 160 height = 10px top/bottom) -->
  <rect x="10" y="10" width="140" height="140" rx="24" fill="#0f1012"/>

  <!-- Corner brackets inside icon -->
  <g transform="translate(10,10)" fill="none" stroke="#c2f04a" stroke-linecap="round" stroke-linejoin="round">
    <!-- Glow layer -->
    <g stroke-width="16" stroke-opacity="0.12">
      <path d="M 24 52 L 24 24 L 52 24"/>
      <path d="M 88 24 L 116 24 L 116 52"/>
      <path d="M 24 88 L 24 116 L 52 116"/>
      <path d="M 88 116 L 116 116 L 116 88"/>
    </g>
    <!-- Brackets -->
    <g stroke-width="7.5">
      <path d="M 24 52 L 24 24 L 52 24"/>
      <path d="M 88 24 L 116 24 L 116 52"/>
      <path d="M 24 88 L 24 116 L 52 116"/>
      <path d="M 88 116 L 116 116 L 116 88"/>
    </g>
    <!-- Flow arrow -->
    <g stroke-width="5.5">
      <line x1="44" y1="70" x2="90" y2="70"/>
      <path d="M 78 57 L 93 70 L 78 83"/>
    </g>
  </g>

  <!-- Wordmark: "Frame" white + "Flow" lime -->
  <text
    x="172" y="108"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="62"
    letter-spacing="-1.5">
    <tspan fill="#f0f2f5">Frame</tspan><tspan fill="#c2f04a">Flow</tspan>
  </text>
</svg>
