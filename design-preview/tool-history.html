<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetFlow · Tarix / Galereya</title>
<style>
  :root{--bg:#090a0c;--panel:#0d0e11;--card:#15171b;--card2:#1a1d22;--card3:#202329;--line:#22252b;--line2:#2c3138;--txt:#f4f6f8;--mut:#989ea6;--mut2:#676d74;--acc:#c2f04a;--acc2:#a6d83a;--acc-ink:#0c1400;--blue:#5aa9ff;--red:#ff6b6b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#05060a;color:var(--txt);line-height:1.4;display:flex;flex-direction:column;align-items:center;padding:22px 12px 60px;min-height:100vh}
  .hint{color:var(--mut);font-size:12.5px;margin-bottom:13px;text-align:center;max-width:440px}.hint b{color:var(--acc2)}
  .app{width:392px;max-width:100%;background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.6);display:flex;flex-direction:column;height:780px;position:relative}
  .pbar{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .back{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--mut);background:var(--card);border:1px solid var(--line2);padding:6px 10px;border-radius:9px;cursor:pointer}
  .back:hover{color:var(--txt)}
  .ttl{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px}.spacer{flex:1}
  .pro{border:1px solid var(--acc2);color:var(--acc);border-radius:999px;padding:5px 10px;font-size:11.5px;font-weight:800}
  /* toolbar: filter + zoom + select */
  .toolbar{display:flex;align-items:center;gap:7px;padding:10px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;overflow-x:auto}
  .tab{flex:0 0 auto;font-size:11.5px;color:var(--mut);background:var(--card);border:1px solid var(--line2);padding:6px 11px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .tab.on{background:var(--card3);color:var(--txt);border-color:var(--mut2);font-weight:700}
  .tbtns{margin-left:auto;display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .ib{width:30px;height:30px;border-radius:8px;border:1px solid var(--line2);background:var(--card);display:grid;place-items:center;color:var(--mut);cursor:pointer;font-size:15px}
  .ib:hover{color:var(--txt);border-color:var(--mut2)}.ib.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
  .scroll{flex:1;overflow-y:auto;padding:12px}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
  .grid{display:grid;gap:8px}
  .grid.z1{grid-template-columns:1fr 1fr 1fr}
  .grid.z2{grid-template-columns:1fr 1fr}
  .grid.z3{grid-template-columns:1fr}
  .item{border:1px solid var(--line2);border-radius:11px;overflow:hidden;background:var(--card);cursor:pointer;position:relative}
  .item.sel{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
  .item .th{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;position:relative}
  .item .badge{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px}
  .item .play{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:24px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .item .cb{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);border:1px solid var(--line2);display:none;place-items:center;cursor:pointer;color:transparent;font-size:12px;font-weight:800;z-index:2}
  .selmode .item .cb{display:grid}.item.sel .cb{background:var(--acc);border-color:var(--acc);color:var(--acc-ink)}
  .item .meta{padding:6px 8px}.item .meta b{font-size:11px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item .meta small{font-size:9.5px;color:var(--mut)}
  .item .acts{display:flex;border-top:1px solid var(--line)}
  .item .acts div{flex:1;text-align:center;padding:6px;font-size:10.5px;color:var(--mut);cursor:pointer}
  .item .acts div:hover{color:var(--txt);background:rgba(255,255,255,.03)}.item .acts div+div{border-left:1px solid var(--line)}
  .selmode .item .acts{display:none}
  .daylbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);font-weight:700;margin:4px 2px 8px}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mut2);text-align:center;gap:8px;padding:30px}.empty .big{font-size:30px;opacity:.5}
  /* batch bar (select mode) */
  .batch{display:none;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line2);background:var(--panel);flex:0 0 auto}
  .batch.on{display:flex}
  .batch .cnt{font-size:12.5px;color:var(--txt);font-weight:700}
  .batch .b{font-size:12px;border:1px solid var(--line2);background:var(--card);border-radius:9px;padding:8px 12px;cursor:pointer;color:var(--txt)}
  .batch .b:hover{border-color:var(--mut2)}.batch .b.dl{margin-left:auto}.batch .b.del{color:var(--red);border-color:rgba(255,107,107,.4)}
  /* thumb fonlari */
  .b1{background:linear-gradient(160deg,#3a2418,#14100c)}.b2{background:radial-gradient(circle at 50% 45%,#5a3bd0,#1a1030)}.b3{background:linear-gradient(180deg,#1a2740,#0c0f18)}.b4{background:linear-gradient(150deg,#243a18,#10140c)}.b5{background:linear-gradient(150deg,#2a1f40,#101018)}.b6{background:linear-gradient(150deg,#0f3030,#0c1414)}.b7{background:linear-gradient(150deg,#402030,#140c10)}
  .toast{position:absolute;left:50%;bottom:70px;transform:translateX(-50%);background:#000;border:1px solid var(--line2);color:var(--txt);font-size:12.5px;padding:9px 14px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}.toast.on{opacity:1}
</style>
</head>
<body>
<div class="hint">🕘 <b>Tarix / Galereya</b> — filter · zoom (−/+) · tanlash (bir nechtani o'chirish/yuklash).</div>

<div class="app" id="app">
  <div class="pbar">
    <div class="back" id="back">‹ Orqaga</div>
    <div class="ttl"><span>🕘</span> Tarix</div>
    <div class="spacer"></div>
    <div class="pro">✦ 588</div>
  </div>

  <div class="toolbar">
    <div class="tab on" data-f="all">Hammasi</div>
    <div class="tab" data-f="image">Rasm</div>
    <div class="tab" data-f="video">Video</div>
    <div class="tab" data-f="audio">Ovoz</div>
    <div class="tab" data-f="sfx">SFX</div>
    <div class="tbtns">
      <div class="ib" id="zoomOut" title="Kichraytirish">−</div>
      <div class="ib" id="zoomIn" title="Kattalashtirish">+</div>
      <div class="ib" id="selToggle" title="Tanlash">☑</div>
    </div>
  </div>

  <div class="scroll" id="scroll"></div>

  <div class="batch" id="batch">
    <span class="cnt" id="batchCnt">0 tanlandi</span>
    <div class="b dl" id="batchDl">⬇ Yuklab olish</div>
    <div class="b del" id="batchDel">🗑 O'chirish</div>
    <div class="b" id="batchCancel">Bekor</div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  var $=function(s){return document.getElementById(s)};
  function toast(t){var e=$('toast');e.textContent=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('on')},1600)}
  // DEMO (realда /api/studio/gen/history)
  var DATA=[
    {id:1,type:'image',title:'Qizil etik · GPT Image 2',sub:'4:3 · Low',day:'Bugun',bg:'b1'},
    {id:2,type:'image',title:'Billur gul',sub:'1:1 · 2K',day:'Bugun',bg:'b2'},
    {id:3,type:'video',title:'Shahar fly-through',sub:'5s · 720p',day:'Bugun',bg:'b3',dur:'0:05'},
    {id:4,type:'sfx',title:'Portlash effekti',sub:'0:03',day:'Bugun',bg:'b7',dur:'0:03'},
    {id:5,type:'image',title:'Mahsulot foni',sub:'1:1 · High',day:'Kecha',bg:'b4'},
    {id:6,type:'audio',title:'Fon musiqa',sub:'0:30',day:'Kecha',bg:'b6',dur:'0:30'},
    {id:7,type:'video',title:'Logo animatsiya',sub:'3s',day:'Kecha',bg:'b5',dur:'0:03'},
    {id:8,type:'image',title:'Kechki shahar',sub:'16:9 · Medium',day:'Kecha',bg:'b3'}
  ];
  var filter='all',zoom=2,selMode=false,selected={};

  function visible(){return DATA.filter(function(d){return filter==='all'||d.type===filter})}
  function render(){
    var sc=$('scroll');sc.innerHTML='';
    var list=visible();
    if(!list.length){sc.innerHTML='<div class="empty"><div class="big">🕘</div><small>Bo‘sh. Gen qilsangiz shu yerda chiqadi.</small></div>';return}
    var days=[];list.forEach(function(d){if(days.indexOf(d.day)<0)days.push(d.day)});
    days.forEach(function(day){
      var lbl=document.createElement('div');lbl.className='daylbl';lbl.textContent=day;sc.appendChild(lbl);
      var g=document.createElement('div');g.className='grid z'+zoom;
      list.filter(function(d){return d.day===day}).forEach(function(d){
        var it=document.createElement('div');it.className='item'+(selected[d.id]?' sel':'');
        var icon=d.type==='video'?'🎬':d.type==='audio'?'🎵':d.type==='sfx'?'🔊':'🖼';
        var tname=d.type==='image'?'Rasm':d.type==='video'?'Video':d.type==='audio'?'Ovoz':'SFX';
        var th='<div class="th '+d.bg+'"><div class="badge">'+icon+' '+tname+'</div>'+((d.type==='video')?'<div class="play">▶</div>':'')+'</div>';
        var actsHtml='<div class="acts"><div class="a-imp">⤓ Import</div><div class="a-dl">⬇</div></div>';
        var cbHtml='<div class="cb">✓</div>';
        it.innerHTML=th+cbHtml+'<div class="meta"><b>'+d.title+'</b><small>'+d.sub+'</small></div>'+actsHtml;
        // normal amallar
        it.querySelector('.a-imp').addEventListener('click',function(e){e.stopPropagation();toast('Import (demo)')});
        it.querySelector('.a-dl').addEventListener('click',function(e){e.stopPropagation();toast('Yuklab olindi')});
        // tanlash
        function toggleSel(){if(selected[d.id])delete selected[d.id];else selected[d.id]=d;it.classList.toggle('sel');updBatch()}
        it.querySelector('.cb').addEventListener('click',function(e){e.stopPropagation();toggleSel()});
        it.addEventListener('click',function(){if(selMode)toggleSel();else toast(d.title)});
        g.appendChild(it);
      });
      sc.appendChild(g);
    });
  }
  function updBatch(){
    var n=Object.keys(selected).length;
    $('batchCnt').textContent=n+' tanlandi';
    $('batch').classList.toggle('on',selMode&&n>0);
  }
  // filter
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});t.classList.add('on');filter=t.getAttribute('data-f');render()})});
  // zoom
  $('zoomIn').addEventListener('click',function(){if(zoom>1){zoom--;render()}}); // kamroq ustun = kattaroq
  $('zoomOut').addEventListener('click',function(){if(zoom<3){zoom++;render()}});
  // select mode
  $('selToggle').addEventListener('click',function(){
    selMode=!selMode;$('selToggle').classList.toggle('on',selMode);$('app').classList.toggle('selmode',selMode);
    if(!selMode){selected={};render()}updBatch();
  });
  $('batchCancel').addEventListener('click',function(){selected={};$('app').classList.remove('selmode');selMode=false;$('selToggle').classList.remove('on');render();updBatch()});
  $('batchDl').addEventListener('click',function(){var n=Object.keys(selected).length;toast(n+' ta yuklab olindi')});
  $('batchDel').addEventListener('click',function(){
    var ids=Object.keys(selected).map(Number);DATA=DATA.filter(function(d){return ids.indexOf(d.id)<0});selected={};render();updBatch();toast(ids.length+' ta o‘chirildi');
  });
  $('back').addEventListener('click',function(){toast('← Orqaga')});

  // selmode klassини app'ga (CSS .selmode .item .cb)
  function applySelClass(){$('app').classList.toggle('selmode',selMode)}
  render();
})();
</script>
</body>
</html>
