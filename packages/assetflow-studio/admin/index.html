<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="assetflow-api" content="https://api.getframeflow.app">
<title>FrameFlow — Admin Console</title>
<script>
(function () {
  var p = location.pathname;
  var base = p.indexOf("/admin") === 0 ? "/admin/" : (location.port === "3001" ? "/" : "/studio/");
  var b = document.createElement("base");
  b.href = base;
  document.head.appendChild(b);
})();
</script>
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/admin.css">
<script src="js/studio-config.js"></script>
<script src="js/theme.js"></script>
</head>
<body class="adx-body portal-admin">
<div class="adx-app" data-screen-label="Admin Console">
  <div class="adx-scrim" id="adxScrim"></div>
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="adx-sbar" id="adxSbar">
    <div class="adx-brand">
      <span class="adx-bmark"><i class="ph-fill ph-lightning"></i></span>
      <div>
        <div class="adx-bname">FrameFlow</div>
        <div class="adx-bsub">ADMIN CONSOLE</div>
      </div>
    </div>
    <nav id="nav" style="display:contents"></nav>
    <div class="adx-sgrow"></div>
    <div class="adx-ucard">
      <span class="adx-av" id="userAvatar" style="background:linear-gradient(140deg,#7b5cff,#4a2fb0)">AD</span>
      <div style="min-width:0">
        <div id="userName" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Admin</div>
        <div style="font-size:10px;color:var(--muted2)">Super Admin</div>
      </div>
      <button type="button" class="uout" onclick="AssetFlowAuth.logout()" title="Log out"><i class="ph ph-sign-out"></i></button>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="adx-main">
    <header class="adx-topbar">
      <button type="button" class="adx-ico adx-navtoggle" id="adxNavToggle" aria-label="Menu"><i class="ph ph-list"></i></button>
      <div style="min-width:0">
        <div class="adx-crumb" id="crumb"></div>
        <div class="adx-ptitle" id="pageTitle">Overview</div>
      </div>
      <span class="adx-portal-badge" style="margin-left:12px">Admin Console</span>
      <span style="flex:1"></span>
      <div class="adx-tbactions" id="tbActions"></div>
      <div class="adx-inp adx-search" style="width:280px;height:34px">
        <i class="ph ph-magnifying-glass" style="font-size:14px;color:#8A93A3"></i>
        <input id="adminGlobalSearch" placeholder="Search template, contributor, ID&#8230;" oninput="adminGlobalSearch(this.value)">
        <span class="adx-kbd">&#8984;K</span>
      </div>
      <button type="button" class="adx-ico" id="adxBell" onclick="route('moderation')" title="Moderation queue"><i class="ph ph-bell"></i><span class="ndot" id="adxBellDot" style="display:none"></span></button>
      <button type="button" class="adx-ico" id="adxThemeBtn" title="Theme"><i class="ph ph-sun" id="adxThemeIco"></i></button>
      <button type="button" class="adx-ico" onclick="AssetFlowAuth.logout()" title="Log out"><i class="ph ph-sign-out"></i></button>
    </header>

    <main class="adx-content" id="adxContent"><div id="view"></div></main>
  </div>
</div>

<script src="js/ui.js"></script>
<script src="js/assetflow-log.js"></script>
<script src="js/studio-api.js"></script>
<script src="js/studio-media.js"></script>
<script src="js/studio-templates.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/studio-stats.js"></script>
<script src="js/admin-views.js"></script>
<script src="js/admin-views2.js"></script>
<script src="js/admin-subscribers.js"></script>
<script src="js/admin-users.js"></script>
<script src="js/admin-plans.js"></script>
<script src="js/admin-logs.js"></script>
<script src="js/admin-business.js"></script>
<script src="js/admin-dashboard.js"></script>
<script src="js/admin-website.js"></script>
<script src="js/admin-releases.js"></script>
<script>
const AF_ADMIN = AssetFlowAuth.requireAuth(["admin"]);
if (!AF_ADMIN) { /* /login.html */ }
if (AF_ADMIN && AF_ADMIN.role !== "admin") {
  location.href = ASSETFLOW_STUDIO.contributorLoginUrl;
}
AssetFlowLog.init({ source: "admin" });
if (AF_ADMIN) {
  const _name = AF_ADMIN.name || AF_ADMIN.email || "Admin";
  const _ini = _name.trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2) || "AD";
  const _el = document.getElementById("userName"); if(_el) _el.textContent = _name;
  const _av = document.getElementById("userAvatar"); if(_av) _av.textContent = _ini;
}

/* ── Nav — layout sidebar has 4 groups (Workspace · Management · Business · System) ── */
const NAV = [
  {grp:'WORKSPACE'},
  {id:'overview',     label:'Overview',           icon:'squares-four'},
  {id:'moderation',   label:'Moderation',         icon:'shield-check'},
  {id:'templates',    label:'All templates',      icon:'stack'},
  {id:'website',      label:'Website',            icon:'globe'},
  {id:'releases',     label:'Plugin releases',    icon:'package'},
  {grp:'MANAGEMENT'},
  {id:'contributors', label:'Contributors',       icon:'users-three'},
  {id:'users',        label:'Users & roles',      icon:'user-gear'},
  {id:'subscribers',  label:'Subscribers',        icon:'puzzle-piece'},
  {id:'plans',        label:'Plans',              icon:'tag'},
  {id:'messaging',    label:'Messages',           icon:'chat-circle-dots'},
  {id:'analytics',    label:'Analytics',          icon:'chart-bar'},
  {grp:'BUSINESS'},
  {id:'finance',      label:'Finance',            icon:'wallet'},
  {id:'metrics',      label:'Business metrics',   icon:'chart-line-up'},
  {id:'pricing',      label:'Pricing management', icon:'currency-circle-dollar'},
  {id:'genspend',     label:'Gen spend',          icon:'gauge'},
  {id:'payouts',      label:'Payouts',            icon:'hand-coins'},
  {id:'activity',     label:'Activity log',       icon:'list-checks'},
  {grp:'SYSTEM'},
  {id:'settings',     label:'Settings',           icon:'gear-six'},
  {id:'logs',         label:'System logs',        icon:'scroll'},
  {id:'audit',        label:'Audit log',          icon:'clipboard-text'},
];

const TITLES = {
  overview:['Overview','Platform status'],
  moderation:['Moderation queue','Review new templates'],
  templates:['All templates','Global catalog'],
  website:['Website / Landing','Public landing content & theme'],
  releases:['Plugin releases','Publish plugin updates to users'],
  contributors:['Contributors','User management'],
  'contributor-detail':['Contributor profile','Contributors'],
  users:['Users & roles','Grant or revoke access roles'],
  subscribers:['AE Plugin subscribers','Real Browse users'],
  'subscriber-detail':['Subscriber profile','AE Plugin subscribers'],
  plans:['Plans','Free and Pro — pricing and limits'],
  messaging:['Messages','Contact center'],
  analytics:['Analytics','In-depth analysis'],
  finance:['Finance','Real revenue, cost and margin'],
  metrics:['Business metrics','Churn, conversion, ARPU'],
  pricing:['Pricing management','Model pricing table'],
  genspend:['Gen spend','Per-user credit spend'],
  payouts:['Payouts','Contributor payouts'],
  activity:['Activity log','Download events'],
  settings:['Settings','Marketplace configuration'],
  logs:['System logs','Admin · Contributor · AE Plugin'],
  audit:['Audit log','Compliance log'],
};

/* Full-bleed (no content padding) screens */
const FLUSH_VIEWS = { moderation: 1, messaging: 1 };

let CURRENT = 'overview';
let ADMIN_GLOBAL_SEARCH = '';

function adminGlobalSearch(q) {
  ADMIN_GLOBAL_SEARCH = (q || "").trim().toLowerCase();
  if (typeof T_SEARCH !== "undefined") T_SEARCH = ADMIN_GLOBAL_SEARCH;
  if (CURRENT === "templates" && typeof renderTemplates === "function") renderTemplates();
  else if (CURRENT === "contributors") route("contributors");
}

function navBadge(n){
  if(n.id==='moderation') return {badge:String(tByStatus('pending').length), badgeCls:'warn'};
  if(n.id==='subscribers') return {badge:String(subscriberCounts().active), badgeCls:'brand'};
  if(n.id==='users' && window._AF_ROLE_PENDING) return {badge:String(window._AF_ROLE_PENDING), badgeCls:'warn'};
  if(n.id==='messaging') {
    const nMsg = window._STUDIO_MSG_UNREAD || 0;
    if (nMsg) return {badge:String(nMsg), badgeCls:'brand'};
  }
  if(n.id==='logs') {
    const err = AssetFlowLog.readLocal().filter((r) => r.level === "error").length;
    if (err) return { badge: String(err), badgeCls: "warn" };
  }
  return {badge:n.badge, badgeCls:n.badgeCls};
}
function renderNav(){
  document.getElementById('nav').innerHTML = NAV.map(n=>{
    if(n.grp) return `<div class="adx-shead">${n.grp}</div>`;
    const b = navBadge(n);
    const showBadge = b.badge && b.badge !== '0';
    return `<button class="adx-sit ${n.id===CURRENT?'on':''}" onclick="route('${n.id}')">
      <i class="ph ph-${n.icon}"></i><span class="lbl">${n.label}</span>
      ${showBadge?`<span class="adx-nbadge ${b.badgeCls||''}">${b.badge}</span>`:''}
    </button>`;
  }).join('');
  const dot = document.getElementById('adxBellDot');
  if (dot) dot.style.display = (typeof tByStatus === 'function' && tByStatus('pending').length) ? '' : 'none';
}

/* Tarix boshqaruvi (#4/#6) — brauzer Orqaga/Oldinga tugmalari ilova ichida yursin,
   sahifa yangilanganda/deep-link'da mos ekran ochilsin. Deep-link mumkin ekranlar = NAV id'lari;
   arg talab qiladigan detal ekranlar ota bo'limiga qaytariladi. */
const ROUTE_VIEWS = NAV.filter(n => n.id).map(n => n.id);
const DETAIL_PARENT = { 'contributor-detail': 'contributors', 'subscriber-detail': 'subscribers' };
let _routeInited = false;

function route(view, arg, fromHistory){
  CURRENT = view;
  // Tarix yozuvi: popstate'dan kelmagan bo'lsa — dastlab replaceState, keyin har o'zgarishda pushState.
  if (!fromHistory) {
    try {
      const hashable = ROUTE_VIEWS.indexOf(view) >= 0;
      const h = '#' + (hashable ? view : (DETAIL_PARENT[view] || view));
      if (!_routeInited) { history.replaceState({ view: view }, '', h); _routeInited = true; }
      else if (h !== location.hash || arg != null) { history.pushState({ view: view }, '', h); }
    } catch (e) {}
  }
  const t = TITLES[view] || [view,''];
  document.getElementById('pageTitle').textContent = t[0];
  document.getElementById('crumb').innerHTML = `<span>FrameFlow</span><i class="ph ph-caret-right" style="font-size:9px"></i><span>${t[1]}</span>`;
  const tba = document.getElementById('tbActions'); if (tba) tba.innerHTML = '';
  document.getElementById('adxContent').classList.toggle('adx-flush', !!FLUSH_VIEWS[view]);
  renderNav();
  document.body.classList.remove('adx-nav-open');
  const fn = VIEWS[view];
  try {
    document.getElementById('view').innerHTML = fn ? fn(arg) :
      `<div class="adx-empty" style="max-width:420px;margin:60px auto"><span class="ei"><i class="ph ph-clock-countdown"></i></span><div style="font-weight:600;font-size:13px">Coming soon</div><div style="font-size:11px;color:var(--muted2);line-height:1.5">This section will be connected in the next phase.</div></div>`;
    if (window.afterRender && window.afterRender[view]) {
      const ar = window.afterRender[view](arg);
      if (ar && typeof ar.then === "function") ar.catch((e) => console.error(e));
    }
    AssetFlowLog.info(`Admin: ${t[0]}`, { action: "navigate", detail: view });
  } catch (e) {
    console.error(e);
    AssetFlowLog.error(e.message, { action: "view_error", detail: view });
    document.getElementById('view').innerHTML = `<div class="adx-empty" style="max-width:420px;margin:60px auto"><span class="ei"><i class="ph ph-warning"></i></span><div style="font-weight:600;font-size:13px">Error</div><div style="font-size:11px;color:var(--muted2)">${e.message}</div></div>`;
  }
  document.getElementById('adxContent').scrollTop = 0;
}

/* Orqaga/Oldinga (popstate) — tarixdagi ekranni tiklaymiz; detal ekran ota bo'limiga. */
window.addEventListener('popstate', (ev) => {
  const st = (ev && ev.state) || {};
  let view = st.view || (location.hash || '').replace('#', '') || 'overview';
  if (DETAIL_PARENT[view]) view = DETAIL_PARENT[view];
  if (ROUTE_VIEWS.indexOf(view) < 0) view = 'overview';
  route(view, null, true);
});

/* ── Mobile drawer (the adx shell handles it itself — theme.js can't find .app) ── */
document.getElementById('adxNavToggle').addEventListener('click', () => {
  document.body.classList.toggle('adx-nav-open');
});
document.getElementById('adxScrim').addEventListener('click', () => {
  document.body.classList.remove('adx-nav-open');
});

/* ── Theme button (for legacy screens; the new shell is dark-fixed) ── */
/* Redesign dark-first: admin opens in dark mode unless the user explicitly chose otherwise */
if (!localStorage.getItem('af-theme')) AssetFlowTheme.apply('dark');
document.getElementById('adxThemeBtn').addEventListener('click', () => AssetFlowTheme.toggle());
window.addEventListener('af-theme-change', (e) => {
  const i = document.getElementById('adxThemeIco');
  if (i) i.className = 'ph ' + (e.detail.theme === 'light' ? 'ph-moon' : 'ph-sun');
});

(async function bootAdmin() {
  await StudioTemplates.init("admin");
  try {
    if (StudioApi.token()) {
      const { items } = await StudioApi.listMessageThreads();
      window._STUDIO_MSG_UNREAD = items.reduce((a, t) => a + (t.unreadCount || 0), 0);
    }
  } catch (_) {}
  try {
    if (StudioApi.token() && StudioApi.listAdminUsers) {
      const p = await StudioApi.listAdminUsers({ pending: true });
      window._AF_ROLE_PENDING = (p.items || []).length;
    }
  } catch (_) {}
  renderNav();
  // ADMIN_REQUIRE_2FA setup gate: login 2FA yozilishi shartligini bildirgan
  // bo'lsa — to'g'ridan Security bo'limiga (Settings) olib boramiz.
  let need2faSetup = false;
  try {
    need2faSetup = sessionStorage.getItem("af_2fa_setup_required") === "1";
    if (need2faSetup) sessionStorage.removeItem("af_2fa_setup_required");
  } catch (_) {}
  if (need2faSetup) {
    route("settings");
    toast("Security", "Two-factor authentication is required for admin accounts — set it up below", "warn");
  } else {
    // Deep-link / yangilash — URL hash'idagi ekranni ochamiz (aks holda Overview).
    const boot = (location.hash || '').replace('#', '');
    route(ROUTE_VIEWS.indexOf(boot) >= 0 ? boot : "overview");
  }
})();
</script>
</body>
</html>
