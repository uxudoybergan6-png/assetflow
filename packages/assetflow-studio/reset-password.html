<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="assetflow-api" content="https://api.getframeflow.app">
<title>FrameFlow — Reset password</title>
<link rel="stylesheet" href="/studio/styles/app.css">
<script src="/studio/js/theme.js"></script>
</head>
<body class="auth-page">
<div class="auth-main" style="min-height:100vh">
  <div class="auth-card">
    <div class="auth-brand-top" style="margin-bottom:24px">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 7.5v9L12 21l8-4.5v-9L12 3Z"/><path d="m4 7.5 8 4.5 8-4.5"/><path d="M12 12v9"/></svg>
      </span>
      <span class="brand-word">Asset<b>Flow</b></span>
    </div>

    <!-- Request email (no token) -->
    <div id="requestView">
      <div class="form-head">
        <h1 class="h1">Reset password</h1>
        <p>Enter your email — a reset link will be sent to your inbox.</p>
      </div>
      <div class="field">
        <label for="reqEmail">Email</label>
        <div class="field-wrap">
          <span class="lead-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 5.5L20 7"/></svg></span>
          <input id="reqEmail" class="input has-lead" type="email" placeholder="email@assetflow.uz" autocomplete="username">
        </div>
      </div>
      <button class="btn btn-primary btn-block" id="reqBtn" onclick="doRequest()">Send link</button>
      <div class="msg" id="reqMsg"></div>
      <a class="auth-back" href="login.html">← Back to sign in</a>
    </div>

    <!-- New password (token present) -->
    <div id="resetView" style="display:none">
      <div class="form-head">
        <h1 class="h1">New password</h1>
        <p>Enter your new password (at least 8 characters).</p>
      </div>
      <div class="field">
        <label for="newPass">New password</label>
        <input id="newPass" class="input" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="newPass2">Confirm password</label>
        <input id="newPass2" class="input" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-block" id="resetBtn" onclick="doReset()">Update password</button>
      <div class="msg" id="resetMsg"></div>
      <a class="auth-back" href="login.html">← Back to sign in</a>
    </div>
  </div>
</div>

<script>
function apiBase(){
  const meta=document.querySelector('meta[name="assetflow-api"]');
  return (meta?.getAttribute('content')||'https://api.getframeflow.app').replace(/\/$/,'');
}
const params=new URLSearchParams(location.search);
const token=params.get('token');
if(token){
  document.getElementById('requestView').style.display='none';
  document.getElementById('resetView').style.display='block';
}

async function postJson(path,body){
  const res=await fetch(apiBase()+path,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const txt=await res.text();let data;try{data=txt?JSON.parse(txt):null;}catch(e){data={raw:txt};}
  if(!res.ok) throw new Error((data&&(data.error?.formErrors?.[0]||data.error))||('HTTP '+res.status));
  return data;
}

async function doRequest(){
  const email=document.getElementById('reqEmail').value.trim();
  const msg=document.getElementById('reqMsg');
  const btn=document.getElementById('reqBtn');
  if(!email){ msg.className='msg err'; msg.textContent='Enter your email'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Sending…';
  try{
    await postJson('/api/auth/forgot-password',{email});
    msg.className='msg ok';
    msg.textContent='If this email is registered, a reset link has been sent. Check your inbox.';
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

async function doReset(){
  const p1=document.getElementById('newPass').value;
  const p2=document.getElementById('newPass2').value;
  const msg=document.getElementById('resetMsg');
  const btn=document.getElementById('resetBtn');
  if(p1.length<8){ msg.className='msg err'; msg.textContent='Password must be at least 8 characters'; return; }
  if(p1!==p2){ msg.className='msg err'; msg.textContent='Passwords do not match'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Updating…';
  try{
    await postJson('/api/auth/reset-password',{token,password:p1});
    msg.className='msg ok';
    msg.textContent='✓ Password updated! Redirecting to sign in…';
    setTimeout(()=>{location.href='login.html';},1800);
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

document.getElementById('reqEmail')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRequest();});
document.getElementById('newPass2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
</script>
</body>
</html>
