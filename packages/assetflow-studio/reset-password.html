<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="assetflow-api" content="https://assetflow-rqbq.onrender.com">
<title>AssetFlow — Parolni tiklash</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#1a1a1a;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:28px;width:100%;max-width:340px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.leaf{width:22px;height:22px;border-radius:4px 12px 4px 12px;background:linear-gradient(135deg,#82c341,#5a9a24)}
.title{font-size:16px;font-weight:700}
.sub{font-size:11px;color:#888;margin:6px 0 18px;line-height:1.5}
label{display:block;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:0 0 5px}
input{width:100%;font-size:13px;color:#e8e8e8;background:#222;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:9px 11px;outline:none;margin-bottom:12px}
input:focus{border-color:rgba(130,195,65,.5);box-shadow:0 0 0 2px rgba(130,195,65,.12)}
.btn{width:100%;height:38px;border-radius:8px;background:#82c341;color:#111;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.4;cursor:not-allowed}
.msg{font-size:11px;margin-top:12px;text-align:center;line-height:1.5;min-height:16px}
.msg.ok{color:#82c341}
.msg.err{color:#ef4444}
.link{display:block;text-align:center;font-size:11px;color:#9ecbff;text-decoration:none;margin-top:14px}
.link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><div class="leaf"></div><div class="title">AssetFlow</div></div>

  <!-- Email so'rash (token yo'q) -->
  <div id="requestView">
    <div class="sub">Parolni tiklash uchun email manzilingizni kiriting. Havola pochtangizga yuboriladi.</div>
    <label>Email</label>
    <input type="email" id="reqEmail" placeholder="email@assetflow.uz" autocomplete="username">
    <button class="btn" id="reqBtn" onclick="doRequest()">Havola yuborish</button>
    <div class="msg" id="reqMsg"></div>
    <a class="link" href="login.html">← Kirishga qaytish</a>
  </div>

  <!-- Yangi parol (token bor) -->
  <div id="resetView" style="display:none">
    <div class="sub">Yangi parolingizni kiriting (kamida 8 belgi).</div>
    <label>Yangi parol</label>
    <input type="password" id="newPass" placeholder="••••••••" autocomplete="new-password">
    <label>Parolni takrorlang</label>
    <input type="password" id="newPass2" placeholder="••••••••" autocomplete="new-password">
    <button class="btn" id="resetBtn" onclick="doReset()">Parolni yangilash</button>
    <div class="msg" id="resetMsg"></div>
    <a class="link" href="login.html">← Kirishga qaytish</a>
  </div>
</div>

<script>
function apiBase(){
  const meta=document.querySelector('meta[name="assetflow-api"]');
  return (meta?.getAttribute('content')||'https://assetflow-rqbq.onrender.com').replace(/\/$/,'');
}
const params=new URLSearchParams(location.search);
const token=params.get('token');
if(token){
  document.getElementById('requestView').style.display='none';
  document.getElementById('resetView').style.display='block';
}

async function postJson(path,body){
  const res=await fetch(apiBase()+path,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const txt=await res.text();let data;try{data=txt?JSON.parse(txt):null;}catch(e){data={raw:txt};}
  if(!res.ok) throw new Error((data&&(data.error?.formErrors?.[0]||data.error))||('HTTP '+res.status));
  return data;
}

async function doRequest(){
  const email=document.getElementById('reqEmail').value.trim();
  const msg=document.getElementById('reqMsg');
  const btn=document.getElementById('reqBtn');
  if(!email){ msg.className='msg err'; msg.textContent='Email kiriting'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Yuborilmoqda…';
  try{
    await postJson('/api/auth/forgot-password',{email});
    msg.className='msg ok';
    msg.textContent='Agar bu email ro\'yxatdan o\'tgan bo\'lsa, tiklash havolasi yuborildi. Pochtangizni tekshiring.';
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

async function doReset(){
  const p1=document.getElementById('newPass').value;
  const p2=document.getElementById('newPass2').value;
  const msg=document.getElementById('resetMsg');
  const btn=document.getElementById('resetBtn');
  if(p1.length<8){ msg.className='msg err'; msg.textContent='Parol kamida 8 belgi'; return; }
  if(p1!==p2){ msg.className='msg err'; msg.textContent='Parollar mos kelmadi'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Yangilanmoqda…';
  try{
    await postJson('/api/auth/reset-password',{token,password:p1});
    msg.className='msg ok';
    msg.textContent='✓ Parol yangilandi! Kirish sahifasiga yo\'naltirilyapsiz…';
    setTimeout(()=>{location.href='login.html';},1800);
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

document.getElementById('reqEmail')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRequest();});
document.getElementById('newPass2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
</script>
</body>
</html>
