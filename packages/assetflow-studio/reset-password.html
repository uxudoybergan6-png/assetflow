<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="assetflow-api" content="https://api.getframeflow.app">
<title>FrameFlow — Reset password</title>
<!-- BATCH6 tema: FOUC oldini olish — birinchi bo'yoqdan oldin html[data-theme] o'rnatiladi
     (platform/index.html bilan SINXRON saqla — bir xil ff-theme kaliti) -->
<script>(function(){try{var t=localStorage.getItem('ff-theme');if(t!=='noir'&&t!=='neon'&&t!=='cold')t='noir';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','noir');}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════ BATCH6 · 3-TEMA TOKEN QATLAMI (noir · neon · cold) — manba: docs/mockups/batch6 ═══════════
   platform/index.html token bloki bilan SINXRON. Standalone sahifa → mockup o'zgaruvchilari to'g'ridan. */
:root,[data-theme="noir"]{--bg:#0a0a0b;--bg-deep:#050506;--surface:#131316;--surface-2:#1b1b1f;--surface-3:#232329;--text:#fff;--text-2:#d0d0d5;--muted:#a2a2aa;--faint:#85858e;--border:rgba(255,255,255,.12);--accent:#fff;--accent-2:#d7d7dc;--on-accent:#09090a;--accent-soft:rgba(255,255,255,.09);--glow:rgba(255,255,255,.11);--danger:#ff675f;--success:#9be36c;--warning:#f7c967;--grad:linear-gradient(135deg,#fff 0%,#a6a6ae 100%);--shadow:0 28px 80px rgba(0,0,0,.45)}
[data-theme="neon"]{--bg:#050505;--bg-deep:#020202;--surface:#0d0d0e;--surface-2:#151517;--surface-3:#1d1d20;--text:#f8f8f5;--text-2:#d0d1ca;--muted:#a0a39a;--faint:#82867c;--border:rgba(216,255,62,.18);--accent:#d8ff3e;--accent-2:#baf02c;--on-accent:#0a0d02;--accent-soft:rgba(216,255,62,.1);--glow:rgba(216,255,62,.35);--danger:#ff635c;--success:#d8ff3e;--warning:#ffd45c;--grad:linear-gradient(135deg,#d8ff3e 0%,#9fe622 100%);--shadow:0 28px 90px rgba(0,0,0,.6)}
[data-theme="cold"]{--bg:#0b0e14;--bg-deep:#070910;--surface:#10141d;--surface-2:#161b28;--surface-3:#1d2434;--text:#f7f9ff;--text-2:#d1d7e8;--muted:#9da7c0;--faint:#7f8aa4;--border:rgba(124,140,255,.22);--accent:#7c8cff;--accent-2:#4fd8eb;--on-accent:#080b16;--accent-soft:rgba(124,140,255,.12);--glow:rgba(79,216,235,.24);--danger:#ff6c7d;--success:#66e8b3;--warning:#ffc96c;--grad:linear-gradient(135deg,#7c8cff 0%,#4fd8eb 100%);--shadow:0 28px 90px rgba(0,0,0,.5)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
h1{font-family:"Space Grotesk",sans-serif;letter-spacing:-.035em}
.auth-screen{min-height:100vh}
.auth-form-wrap{display:grid;place-items:center;padding:50px;background:var(--bg);min-height:100vh}
.auth-form{width:min(420px,100%)}
.auth-form h1{font-size:38px;margin:26px 0 8px}
.auth-form>p,#requestView>p,#resetView>p{color:var(--muted);margin:0}
.brand{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:700;font-family:"Space Grotesk",sans-serif;text-decoration:none;white-space:nowrap;color:var(--text)}
.brand-mark{display:grid;place-items:center;width:27px;height:27px;border-radius:8px;background:var(--grad);color:var(--on-accent);font-size:16px}
.field{margin-top:15px}
.field label{display:block;font:600 8px "JetBrains Mono",monospace;color:var(--muted);letter-spacing:.08em}
.field input{width:100%;margin-top:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;padding:11px;outline:0;font:inherit}
.field input:focus{border-color:var(--accent)}
.field-hint{display:block;margin-top:6px;color:var(--muted);font-size:10px}
.primary{border:0;border-radius:10px;padding:11px 16px;font-weight:700;font-family:inherit;transition:all .18s ease;background:var(--grad);color:var(--on-accent);box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 28px var(--glow);cursor:pointer}
.primary:hover{transform:translateY(-2px);filter:brightness(1.08);box-shadow:0 0 0 1px var(--accent),0 14px 34px var(--glow)}
.primary:disabled{opacity:.5;cursor:not-allowed;transform:none!important;filter:none!important}
.full{width:100%;margin-top:10px}
.auth-submit{margin-top:18px}
.auth-switch{text-align:center;font-size:11px;color:var(--muted);margin-top:17px}
.auth-switch a,.auth-switch button{border:0;background:none;color:var(--accent);font-weight:700;font-family:inherit;text-decoration:none;cursor:pointer;font-size:11px}
.auth-switch a:hover,.auth-switch button:hover{text-decoration:underline}
/* .msg — status matni (JS: 'msg ok' / 'msg err') */
.msg{margin-top:14px;font-size:12.5px;line-height:1.5;min-height:1px}
.msg.ok{color:var(--success)}
.msg.err{color:var(--danger)}
/* Minimal tema almashtirgich — ff-theme parity */
.theme-cyc{position:fixed;top:18px;right:18px;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:grid;place-items:center;cursor:pointer;font-size:15px;z-index:5}
.theme-cyc:hover{color:var(--text);border-color:var(--accent)}
</style>
</head>
<body class="auth-page">
<button class="theme-cyc" type="button" onclick="cycleTheme()" title="Theme" aria-label="Switch theme">◐</button>
<div class="auth-screen"><div class="auth-form-wrap">
  <form class="auth-form" onsubmit="return false">
    <a class="brand" href="/"><span class="brand-mark" aria-hidden="true">ϟ</span>FrameFlow</a>

    <!-- Request email (no token) -->
    <div id="requestView">
      <h1>Reset your password.</h1>
      <p>Enter your email — we&rsquo;ll send a secure reset link to your inbox.</p>
      <div class="field">
        <label for="reqEmail">EMAIL</label>
        <input id="reqEmail" type="email" placeholder="you@getframeflow.app" autocomplete="username">
      </div>
      <button class="primary full auth-submit" id="reqBtn" onclick="doRequest()">Send reset link &rarr;</button>
      <div class="msg" id="reqMsg"></div>
      <div class="auth-switch"><a href="login.html">&larr; Back to sign in</a></div>
    </div>

    <!-- New password (token present) -->
    <div id="resetView" style="display:none">
      <h1>Set a new password.</h1>
      <p>The reset link works once. Choose a new password (at least 8 characters).</p>
      <div class="field">
        <label for="newPass">NEW PASSWORD</label>
        <input id="newPass" type="password" placeholder="••••••••" autocomplete="new-password">
        <small class="field-hint">At least 8 characters</small>
      </div>
      <div class="field">
        <label for="newPass2">REPEAT NEW PASSWORD</label>
        <input id="newPass2" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="primary full auth-submit" id="resetBtn" onclick="doReset()">Save new password &rarr;</button>
      <div class="msg" id="resetMsg"></div>
      <div class="auth-switch"><a href="login.html">&larr; Back to sign in</a></div>
    </div>
  </form>
</div></div>

<script>
/* Minimal tema tsikli — ff-theme kalitini platform bilan bo'lishadi (FOUC yuqorida o'qiydi). */
function cycleTheme(){var o=['noir','neon','cold'];var c=document.documentElement.getAttribute('data-theme')||'noir';var n=o[(o.indexOf(c)+1)%o.length];document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('ff-theme',n);}catch(e){}}
</script>
<script>
function apiBase(){
  const meta=document.querySelector('meta[name="assetflow-api"]');
  return (meta?.getAttribute('content')||'https://api.getframeflow.app').replace(/\/$/,'');
}
const params=new URLSearchParams(location.search);
const token=params.get('token');
if(token){
  document.getElementById('requestView').style.display='none';
  document.getElementById('resetView').style.display='block';
}

async function postJson(path,body){
  const res=await fetch(apiBase()+path,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const txt=await res.text();let data;try{data=txt?JSON.parse(txt):null;}catch(e){data={raw:txt};}
  if(!res.ok) throw new Error((data&&(data.error?.formErrors?.[0]||data.error))||('HTTP '+res.status));
  return data;
}

async function doRequest(){
  const email=document.getElementById('reqEmail').value.trim();
  const msg=document.getElementById('reqMsg');
  const btn=document.getElementById('reqBtn');
  if(!email){ msg.className='msg err'; msg.textContent='Enter your email'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Sending…';
  try{
    await postJson('/api/auth/forgot-password',{email});
    msg.className='msg ok';
    msg.textContent='If this email is registered, a reset link has been sent. Check your inbox.';
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

async function doReset(){
  const p1=document.getElementById('newPass').value;
  const p2=document.getElementById('newPass2').value;
  const msg=document.getElementById('resetMsg');
  const btn=document.getElementById('resetBtn');
  if(p1.length<8){ msg.className='msg err'; msg.textContent='Password must be at least 8 characters'; return; }
  if(p1!==p2){ msg.className='msg err'; msg.textContent='Passwords do not match'; return; }
  btn.disabled=true; msg.className='msg'; msg.textContent='Updating…';
  try{
    await postJson('/api/auth/reset-password',{token,password:p1});
    msg.className='msg ok';
    msg.textContent='✓ Password updated! Redirecting to sign in…';
    setTimeout(()=>{location.href='login.html';},1800);
  }catch(e){
    msg.className='msg err'; msg.textContent=String(e.message||e);
    btn.disabled=false;
  }
}

document.getElementById('reqEmail')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRequest();});
document.getElementById('newPass2')?.addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
</script>
</body>
</html>
