<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FrameFlow — Premium redesign namuna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" rel="stylesheet">
<style>
  :root{
    --bg:#08080A; --bg2:#0D0D10; --panel:#111114; --panel2:#161619;
    --card:#131316; --card2:#1A1A1F; --card3:#212127;
    --bd:#1E1E23; --bd2:#2A2A31; --bd3:#37373F;
    --txt:#EDEDEF; --txt2:#9A9AA3; --txt3:#63636C;
    --acc:#C9F24A; --acc-dim:rgba(201,242,74,.10);
    --r:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0}
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  /* SIDEBAR */
  .side{background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 14px}
  .logo{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:22px}
  .logo .mark{width:26px;height:26px;border-radius:7px;background:var(--txt);display:grid;place-items:center;color:var(--bg)}
  .logo .mark i{font-size:15px}
  .logo span{font-weight:600;font-size:16px;letter-spacing:-.02em}
  .nav{display:flex;flex-direction:column;gap:1px;flex:1}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--txt2);font-size:13.5px;font-weight:450;cursor:pointer;transition:.14s}
  .nav a:hover{background:var(--card);color:var(--txt)}
  .nav a.on{background:var(--card2);color:var(--txt)}
  .nav a i{font-size:17px;width:18px}
  .nav a.on i{color:var(--acc)}
  .side-foot{display:flex;align-items:center;gap:10px;padding:10px;border-top:1px solid var(--bd);margin-top:8px}
  .ava{width:30px;height:30px;border-radius:50%;background:var(--card3);display:grid;place-items:center;font-size:12px;font-weight:500;color:var(--txt2)}
  .side-foot .nm{font-size:12.5px;font-weight:500}
  .side-foot .sub{font-size:11px;color:var(--txt3)}
  /* MAIN */
  .main{display:flex;flex-direction:column;min-width:0}
  .top{height:60px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--bd)}
  .search{position:relative;flex:1;max-width:340px}
  .search i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:15px}
  .search input{width:100%;height:38px;padding:0 14px 0 38px;border-radius:9px;background:var(--card);border:1px solid var(--bd);color:var(--txt);font-family:inherit;font-size:13.5px;outline:none}
  .search input::placeholder{color:var(--txt3)}
  .spacer{flex:1}
  .credits{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;background:var(--card);border:1px solid var(--bd);font-size:13px;font-weight:500;color:var(--txt)}
  .credits i{font-size:14px;color:var(--acc)}
  .icon-btn{width:38px;height:38px;border-radius:9px;background:var(--card);border:1px solid var(--bd);color:var(--txt2);cursor:pointer;display:grid;place-items:center;font-size:17px}
  /* WORK AREA */
  .work{flex:1;display:flex;gap:14px;padding:22px 24px}
  .rail{width:66px;flex:none;border-radius:var(--r);background:var(--panel);border:1px solid var(--bd);display:flex;flex-direction:column;padding:10px 8px;gap:4px}
  .rail button{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 4px 9px;border-radius:10px;background:none;border:none;color:var(--txt3);font-family:inherit;cursor:pointer;transition:.14s}
  .rail button:hover{background:var(--card);color:var(--txt2)}
  .rail button.on{background:var(--card2);color:var(--txt)}
  .rail button.on::before{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:2.5px;height:18px;border-radius:0 2px 2px 0;background:var(--acc)}
  .rail button i{font-size:19px}
  .rail button span{font-size:9.5px;font-weight:500}
  /* CONTROLS */
  .ctrl{width:360px;flex:none;border-radius:var(--r);background:var(--panel);border:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
  .ctrl-head{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
  .ctrl-head .t{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .ctrl-head .m{font-size:11.5px;color:var(--txt3);margin-top:2px}
  .cost{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--bd2);font-size:12px;font-weight:500;color:var(--txt2)}
  .cost i{font-size:12px;color:var(--acc)}
  .ctrl-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:22px}
  .lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:9px}
  .ta{width:100%;min-height:104px;resize:none;padding:13px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd);color:var(--txt);font-family:inherit;font-size:13.5px;line-height:1.55;outline:none}
  .ta::placeholder{color:var(--txt3)}
  .enhance{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 12px;border-radius:8px;background:none;border:1px solid var(--bd2);color:var(--txt2);font-family:inherit;font-size:12px;font-weight:450;cursor:pointer}
  .enhance i{font-size:13px;color:var(--acc)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .chips button{padding:6px 11px;border-radius:8px;background:var(--card);border:1px solid var(--bd);color:var(--txt2);font-family:inherit;font-size:12px;cursor:pointer}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:52px;padding:10px 8px;border-radius:9px;background:var(--card);border:1px solid var(--bd);color:var(--txt2);font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:400;cursor:pointer}
  .seg button.on{background:var(--card3);border-color:var(--bd3);color:var(--txt)}
  .divi{border-top:1px solid var(--bd);padding-top:20px}
  .sel{display:flex;align-items:center;justify-content:space-between;width:100%;padding:11px 14px;border-radius:10px;background:var(--bg2);border:1px solid var(--bd);color:var(--txt);font-family:inherit;font-size:13px;cursor:pointer}
  .sel .l{display:inline-flex;align-items:center;gap:9px}
  .sel .l i{color:var(--txt2);font-size:15px}
  .sel .c{color:var(--txt3);font-size:12px}
  .ctrl-foot{padding:16px 20px;border-top:1px solid var(--bd)}
  .foot-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:12px}
  .foot-row .k{color:var(--txt3)}
  .foot-row .v{font-weight:500;color:var(--txt)}
  .gen{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:11px;background:var(--acc);color:#0C1400;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer}
  .gen i{font-size:16px}
  /* CANVAS */
  .canvas{flex:1;min-width:0;border-radius:var(--r);background:var(--bg2);border:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
  .cv-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd)}
  .cv-head .l{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:500}
  .cv-head .l i{color:var(--txt2);font-size:16px}
  .cv-actions{display:flex;gap:8px}
  .cv-actions button{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:9px;background:var(--card);border:1px solid var(--bd2);color:var(--txt2);font-family:inherit;font-size:12.5px;font-weight:450;cursor:pointer}
  .cv-actions button.pri{background:var(--card2);color:var(--txt)}
  .cv-actions button i{font-size:14px}
  .cv-body{flex:1;display:grid;place-items:center;padding:28px;position:relative;background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.015), transparent 60%),
    var(--bg2)}
  .stage{width:min(100%,440px);aspect-ratio:1;border-radius:16px;overflow:hidden;border:1px solid var(--bd2);position:relative;
    background:linear-gradient(155deg,#1b2530,#0f1319)}
  .stage .ph{position:absolute;inset:0;display:grid;place-items:center;color:var(--txt3)}
  .stage .ph i{font-size:30px;opacity:.5}
  .stage .meta{position:absolute;left:16px;right:16px;bottom:14px}
  .stage .meta .t{font-size:14px;font-weight:500;color:#fff}
  .stage .meta .s{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}
  .cv-foot{border-top:1px solid var(--bd);padding:12px 16px}
  .cv-foot .lbl{margin-bottom:10px;display:flex;justify-content:space-between}
  .film{display:flex;gap:8px;overflow-x:auto}
  .film .th{flex:none;width:78px;height:78px;border-radius:10px;border:1px solid var(--bd2);overflow:hidden;position:relative;cursor:pointer;background:#14181e}
  .film .th.on{border:1.5px solid var(--acc)}
  .film .th .tag{position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:6px;background:rgba(0,0,0,.5);display:grid;place-items:center;font-size:9px;color:#fff}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="logo"><div class="mark"><i class="ph ph-stack"></i></div><span>FrameFlow</span></div>
    <nav class="nav">
      <a><i class="ph ph-house"></i>Bosh sahifa</a>
      <a><i class="ph ph-squares-four"></i>Shablonlar</a>
      <a class="on"><i class="ph ph-sparkle"></i>AI Studio</a>
      <a><i class="ph ph-download-simple"></i>Yuklamalarim</a>
      <a><i class="ph ph-folders"></i>Loyihalar</a>
      <a><i class="ph ph-plugs-connected"></i>Plagin</a>
      <a><i class="ph ph-gear-six"></i>Sozlamalar</a>
    </nav>
    <div class="side-foot">
      <div class="ava">AX</div>
      <div style="flex:1;min-width:0"><div class="nm">Aziz Xolmatov</div><div class="sub">Pro reja</div></div>
    </div>
  </aside>
  <!-- MAIN -->
  <div class="main">
    <header class="top">
      <div class="search"><i class="ph ph-magnifying-glass"></i><input placeholder="Shablon yoki AI vositasi qidiring"></div>
      <div class="spacer"></div>
      <div class="credits"><i class="ph ph-lightning"></i><span class="mono">1,230</span></div>
      <button class="icon-btn"><i class="ph ph-plus"></i></button>
      <button class="icon-btn"><i class="ph ph-bell"></i></button>
    </header>
    <div class="work">
      <!-- RAIL -->
      <div class="rail">
        <button class="on"><i class="ph ph-image"></i><span>Rasm</span></button>
        <button><i class="ph ph-video-camera"></i><span>Video</span></button>
        <button><i class="ph ph-microphone"></i><span>Ovoz</span></button>
        <button><i class="ph ph-waveform"></i><span>SFX</span></button>
      </div>
      <!-- CONTROLS -->
      <div class="ctrl">
        <div class="ctrl-head">
          <div><div class="t">Rasm yaratish</div><div class="m mono">FrameFlow Vision 2</div></div>
          <div class="cost"><i class="ph ph-lightning"></i>20</div>
        </div>
        <div class="ctrl-body">
          <div>
            <div class="lbl">Prompt</div>
            <textarea class="ta" placeholder="Yaratmoqchi bo'lgan tasviringizni yozing — neon shahar, kechqurun yomg'ir, kinematik yorug'lik"></textarea>
            <button class="enhance"><i class="ph ph-sparkle"></i>Yaxshilash</button>
            <div class="chips">
              <button>Neon shahar</button><button>Mahsulot studiyasi</button><button>Tog' manzarasi</button>
            </div>
          </div>
          <div class="divi">
            <div class="lbl">Model</div>
            <button class="sel"><span class="l"><i class="ph ph-cube"></i>FrameFlow Vision 2</span><i class="ph ph-caret-down" style="color:var(--txt3);font-size:13px"></i></button>
          </div>
          <div class="divi">
            <div class="lbl">O'lcham</div>
            <div class="seg"><button class="on">1:1</button><button>16:9</button><button>9:16</button><button>4:3</button></div>
          </div>
          <div class="divi">
            <div class="lbl">Soni</div>
            <div class="seg"><button>1</button><button>2</button><button class="on">4</button><button>8</button></div>
          </div>
        </div>
        <div class="ctrl-foot">
          <div class="foot-row"><span class="k">5 kredit × 4 rasm</span><span class="v mono">20 kredit</span></div>
          <button class="gen"><i class="ph ph-lightning"></i>Yaratish</button>
        </div>
      </div>
      <!-- CANVAS -->
      <div class="canvas">
        <div class="cv-head">
          <div class="l"><i class="ph ph-monitor"></i>Ishchi maydon</div>
          <div class="cv-actions">
            <button><i class="ph ph-image"></i>Referens</button>
            <button><i class="ph ph-trash"></i></button>
            <button class="pri"><i class="ph ph-download-simple"></i>Yuklab olish</button>
          </div>
        </div>
        <div class="cv-body">
          <div class="stage">
            <div class="ph"><i class="ph ph-image"></i></div>
            <div class="meta"><div class="t">Neon shahar konsepti</div><div class="s mono">Rasm · Vision 2 · 4K</div></div>
          </div>
        </div>
        <div class="cv-foot">
          <div class="lbl"><span>So'nggi generatsiyalar</span><span class="mono" style="color:var(--txt3)">6 ta</span></div>
          <div class="film">
            <div class="th on"><div class="tag"><i class="ph ph-image"></i></div></div>
            <div class="th"><div class="tag"><i class="ph ph-video-camera"></i></div></div>
            <div class="th"><div class="tag"><i class="ph ph-image"></i></div></div>
            <div class="th"><div class="tag"><i class="ph ph-image"></i></div></div>
            <div class="th"><div class="tag"><i class="ph ph-waveform"></i></div></div>
            <div class="th"><div class="tag"><i class="ph ph-image"></i></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
