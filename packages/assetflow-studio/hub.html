<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="assetflow-api" content="https://api.getframeflow.app">
<title>FrameFlow — Home</title>
<script>
(function () {
  var b = document.createElement("base");
  b.href = location.pathname.includes("/studio/") ? "/studio/" : "/";
  document.head.appendChild(b);
})();
</script>
<link rel="stylesheet" href="styles/app.css">
<style>
  .hub-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; background: var(--bg-0); }
  .hub-wrap { max-width: 720px; width: 100%; text-align: center; }
  .hub-brand { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .hub-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .hub-sub { color: var(--tx-2); margin-bottom: 36px; font-size: 15px; }
  .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
  @media (max-width: 640px) { .hub-grid { grid-template-columns: 1fr; } }
  .hub-card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 28px 24px; background: var(--bg-2);
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .hub-card:hover { border-color: var(--violet-line); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,.25); }
  .hub-card.admin:hover { border-color: var(--green); }
  .hub-ico { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 22px; }
  .hub-card.contrib .hub-ico { background: var(--violet-dim); color: var(--violet-bright); }
  .hub-card.admin .hub-ico { background: var(--green-dim); color: var(--green); }
  .hub-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .hub-card p { font-size: 13px; color: var(--tx-2); line-height: 1.5; margin-bottom: 14px; }
  .hub-url { font-size: 11px; color: var(--tx-3); font-family: ui-monospace, monospace; word-break: break-all; }
  .hub-foot { margin-top: 28px; font-size: 12px; color: var(--tx-3); }
  .hub-status { display: inline-flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
  .hub-pill { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); }
  .hub-pill.ok { border-color: var(--green); color: var(--green); }
  .hub-pill.bad { border-color: var(--red); color: var(--red); }
</style>
</head>
<body class="hub-page">
<div class="hub-wrap">
  <div class="hub-brand">
    <div class="brand-mark" style="width:40px;height:40px;border-radius:10px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M6.1 9.6V6.1h3.5"/><path d="M14.4 6.1h3.5v3.5"/><path d="M6.1 14.4v3.5h3.5"/><path d="M14.4 17.9h3.5v-3.5"/><path d="M8.9 12h4.6"/><path d="m13.4 10 2 2-2 2"/></svg>
    </div>
    <span class="brand-name" style="font-size:22px">FrameFlow</span>
  </div>
  <h1 class="hub-title">Which panel?</h1>
  <p class="hub-sub">Bookmark this page to avoid confusion</p>
  <div class="hub-status" id="hubStatus"></div>
  <!-- Admin Console havolasi ATAYIN yo'q — admin login ommaviy sahifalardan
       bog'lanmaydi (adminlar /admin/ manzilini o'zlari biladi). -->
  <div class="hub-grid" style="grid-template-columns:1fr;max-width:420px;margin:0 auto">
    <a class="hub-card contrib" href="/studio/login.html" id="linkContrib">
      <div class="hub-ico">↑</div>
      <h2>Contributor Studio</h2>
      <p>Upload templates, check status, submit for moderation</p>
      <span class="hub-url" id="urlContrib">/studio/login.html</span>
    </a>
  </div>
  <p class="hub-foot">Online: Vercel · Local: <code>npm run studio</code></p>
</div>
<script src="js/studio-config.js"></script>
<script>
(async function () {
  const cfg = window.ASSETFLOW_STUDIO;
  if (cfg) {
    document.getElementById("linkContrib").href = cfg.contributorLoginUrl;
    document.getElementById("urlContrib").textContent = cfg.contributorLoginUrl.replace(/^https?:\/\//, "");
  }
  const el = document.getElementById("hubStatus");
  const apiBase = cfg?.apiUrl || "https://api.getframeflow.app";
  async function ping(url, label) {
    try {
      const r = await fetch(url, { mode: "cors" });
      return r.ok ? label + " ✓" : label + " ✗";
    } catch {
      return label + " ✗";
    }
  }
  const pills = [await ping(apiBase + "/health", "API")];
  if (location.hostname === "localhost") {
    pills.push(await ping("http://localhost:3000/studio/hub.html", "Web"));
    pills.push(await fetch("http://localhost:3001/login.html", { mode: "no-cors" }).then(() => "Admin ✓").catch(() => "Admin ✗"));
  } else {
    pills.push("Studio ✓");
    pills.push("Admin ✓");
  }
  el.innerHTML = pills.map((t) => {
    const ok = t.includes("✓");
    return `<span class="hub-pill ${ok ? "ok" : "bad"}">${t}</span>`;
  }).join("");
})();
</script>
</body>
</html>
